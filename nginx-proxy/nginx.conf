events {
    worker_connections 1024;
}

http {
      upstream backend_cluster {
            server backend:3001;
      }

      upstream frontend_cluster {
            server frontend:80;
      }

      server {
            listen 80;

            location / {
                  proxy_pass http://frontend_cluster;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
            }

            location /api/ {
                  proxy_pass http://backend_cluster/;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
            }
      }
}